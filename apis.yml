aid: openuv
name: OpenUV
description: >-
  OpenUV provides a global real-time UV index API. The service combines meteorological inputs (ozone, cloud cover, area
  reflection) with NASA satellite sources to return current UV index, daily maximum UV, ozone level, safe sun-exposure
  times per Fitzpatrick skin type, and a recommended sun protection window for any geographic coordinate.

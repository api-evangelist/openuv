apis:
  - aid: openuv:openuv
    name: OpenUV
    description: >-
      Real-time global UV index API returning current UV index, daily maximum UV, ozone, sun position, and safe exposure
      times by skin type for any latitude/longitude. Supports forecast windows and recommended sun-protection time
      windows. All endpoints are GET-only, authenticated via x-access-token header.

meters:
  - name: subscription_fee
    description: Monthly plan subscription (Free $0, Hobbyist ~$4.99, Personal ~$9.99, Pro ~$49.99, Enterprise custom).
    unit: month
    aggregation: sum
    dimensions:
      - account
      - plan
  - name: requests
    description: Daily API request count per API key. Reported in /stat as requests_today, requests_yesterday, requests_month, requests_last_month. Hard-capped per tier; 429 on exhaustion, no overage charge.
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - day
  - name: accrued_cost
    description: OpenUV-reported accrued cost per period exposed by the /stat endpoint as cost_today, cost_yesterday, cost_month, cost_last_month (USD).
    unit: USD
    aggregation: sum
    dimensions:
      - api_key
      - day
principles:
  - name: Visibility
    description: Use the /stat endpoint to observe per-key request counts and accrued costs daily; export to your FinOps dashboard.
  - name: Allocation
    description: Issue one API key per application or environment so cost and quota can be allocated to the consuming service.
  - name: Optimization
    description: Cache UV index and forecast responses for the polling interval appropriate to your tier (e.g. once per hour on Free), and prefer the forecast endpoint over repeated /uv polling.
  - name: Accountability
    description: Set a budget owner per API key, alert on requests_today approaching the tier quota, and pre-empt 429s by upgrading or throttling client calls.
  - name: Sustainable Usage
    description: The Free tier (50 req/day) is intended for hobby and integration use; production traffic should be on Pro or Unlimited to avoid 429-induced data gaps.

description: FOCUS-aligned FinOps profile for OpenUV. OpenUV billing combines a fixed monthly subscription per plan tier (Free / Hobbyist / Personal / Pro / Enterprise) with a hard daily request quota — there is no per-request overage; calls beyond the quota are rejected with HTTP 429 until the next UTC day or until billing details are added to upgrade to 15,000 req/day.
sources:
  - https://www.openuv.io/console
  - https://www.openuv.io/blog
  - https://focus.finops.org/focus-specification/v1-3/
